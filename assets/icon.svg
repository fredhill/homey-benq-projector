<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">

  <!-- Projector body — fills more of the circle -->
  <rect x="12" y="24" width="76" height="48" rx="10" ry="10" fill="white"/>

  <!-- Lens housing — large circle protruding from left side -->
  <circle cx="32" cy="48" r="22" fill="white"/>

  <!-- Lens barrel ring (dark, creates depth) -->
  <circle cx="32" cy="48" r="16" fill="#1a1a2e"/>

  <!-- Lens glass — BenQ purple -->
  <circle cx="32" cy="48" r="10" fill="#a855f7"/>

  <!-- Lens glare highlight -->
  <circle cx="25" cy="40" r="3.5" fill="white" opacity="0.80"/>

  <!-- Vent slots — right side of body -->
  <rect x="70" y="32" width="11" height="3" rx="1.5" fill="#7c3aed" opacity="0.65"/>
  <rect x="70" y="39" width="11" height="3" rx="1.5" fill="#7c3aed" opacity="0.65"/>
  <rect x="70" y="46" width="11" height="3" rx="1.5" fill="#7c3aed" opacity="0.65"/>
  <rect x="70" y="53" width="11" height="3" rx="1.5" fill="#7c3aed" opacity="0.65"/>
  <rect x="70" y="60" width="11" height="3" rx="1.5" fill="#7c3aed" opacity="0.65"/>

  <!-- Status LED — green -->
  <circle cx="80" cy="67" r="3.5" fill="#00e676"/>

</svg>
