<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Mask: white = show white, black = punch transparent hole (navy shows through) -->
    <mask id="pm">
      <!-- Projector body -->
      <rect x="15" y="27" width="72" height="46" rx="10" fill="white"/>
      <!-- Lens housing circle -->
      <circle cx="33" cy="50" r="21" fill="white"/>
      <!-- Lens barrel hole — navy shows through here -->
      <circle cx="33" cy="50" r="14" fill="black"/>
      <!-- Vent slot holes — navy shows through here -->
      <rect x="64" y="33" width="16" height="4" rx="2" fill="black"/>
      <rect x="64" y="41" width="16" height="4" rx="2" fill="black"/>
      <rect x="64" y="49" width="16" height="4" rx="2" fill="black"/>
      <rect x="64" y="57" width="16" height="4" rx="2" fill="black"/>
      <rect x="64" y="65" width="16" height="4" rx="2" fill="black"/>
    </mask>
  </defs>

  <!-- White projector silhouette, holes punched by mask -->
  <rect x="0" y="0" width="100" height="100" fill="white" mask="url(#pm)"/>

  <!-- Lens glass centre dot — white over the transparent barrel -->
  <circle cx="33" cy="50" r="6" fill="white"/>

  <!-- Lens glare -->
  <circle cx="26" cy="43" r="3" fill="white" opacity="0.85"/>
</svg>
