<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">

  <!-- Light beam: triangle from lens to left edge -->
  <polygon points="21,44 4,30 4,70 21,56" fill="#c084fc" opacity="0.30"/>

  <!-- Projector body -->
  <rect x="18" y="32" width="66" height="42" rx="9" ry="9" fill="white"/>

  <!-- Lens housing (circle overlapping the left side of body) -->
  <circle cx="37" cy="53" r="17" fill="white"/>

  <!-- Lens barrel (dark ring) -->
  <circle cx="37" cy="53" r="12" fill="#1a1a2e"/>

  <!-- Lens glass (BenQ purple tint) -->
  <circle cx="37" cy="53" r="7" fill="#a855f7" opacity="0.85"/>

  <!-- Lens glare dot -->
  <circle cx="32" cy="47" r="2.8" fill="white"/>

  <!-- Vent slots on right side of body -->
  <rect x="64" y="40" width="13" height="2.5" rx="1.2" fill="#7c3aed" opacity="0.5"/>
  <rect x="64" y="46" width="13" height="2.5" rx="1.2" fill="#7c3aed" opacity="0.5"/>
  <rect x="64" y="52" width="13" height="2.5" rx="1.2" fill="#7c3aed" opacity="0.5"/>
  <rect x="64" y="58" width="13" height="2.5" rx="1.2" fill="#7c3aed" opacity="0.5"/>

  <!-- Status indicator light (green = on) -->
  <circle cx="75" cy="67" r="3" fill="#00e676"/>

  <!-- Small control button -->
  <circle cx="68" cy="67" r="3" fill="#7c3aed" opacity="0.7"/>

</svg>
